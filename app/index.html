<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Security: strict CSP. 'wasm-unsafe-eval' is required for PDFium WASM.
         No third-party origins anywhere — fonts are self-hosted. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; worker-src 'self' blob:; connect-src 'self' http://localhost:5050 http://127.0.0.1:5050 http://localhost:5051 http://127.0.0.1:5051 https://editar-21ft.onrender.com; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <link rel="icon" type="image/png" href="/EDITAR.png" />
    <link rel="apple-touch-icon" href="/EDITAR.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Editar — the private PDF workspace. Every file is processed locally in your browser; nothing is ever uploaded."
    />
    <link rel="preload" href="/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/source-sans-3-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Editar — private PDF workspace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
